name: Pandora
description: Pandora is an internet radio and music streaming service powered by the
  Music Genome Project, offering personalized radio stations and on-demand streaming
  with a catalog of over 30 million tracks including songs, comedy albums, podcasts,
  and more. The Pandora GraphQL API enables developers to build applications that
  access stations, tracks, artist information, user listening history, feedback, playlists,
  and personalized radio content across Free, Plus, and Premium subscription tiers.
