apis:
- name: Pandora GraphQL API
  description: The Pandora GraphQL API provides access to Pandora's music catalog
    and listener data, enabling developers to build applications with playback controls,
    search, user collection management, feedback (thumbs up/down), profile retrieval,
    and podcast support. All API access is gated by OAuth 2.0 bearer tokens and requires
    an approved partner relationship with Pandora.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
